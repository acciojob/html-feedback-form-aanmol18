<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<body>
    <h1>Feedback Form</h1>
    <form action="/submit-data" method="post">
        <label>Name </label>
        <input type="text" id="name" placeholder="Enter your name" minlength="3" maxlength="50" required> <br><br>

        <label>Portfolio </label>
        <input type="url" id="portfolio" required> <br><br>

        <label>Favorite Color: </label>
        <input type="color" id="favColor" required> <br><br>

        <label>Likeness: </label>
        <input type="range" max="100" min="1" id="likeness" required> <br><br>

        <button type="submit">Submit</button>

    </form>
</body>
</html>
