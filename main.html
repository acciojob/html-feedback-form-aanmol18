<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<body>
    <h1>Feedback Form</h1>
    <form method="post">
        <label for="userName">Name: </label>
        <input type="text" name="userName" id="name" placeholder="Enter your name" required minlength="3" maxlength="50"> <br><br>

        <label for="portfolio">Your Portfolio Link: </label>
        <input type="url" name="portfolio" id="portfolio" placeholder="Enter your portfolio link" required> <br><br>

        <label for="favColor">Favorite Color: </label>
        <input type="color" name="favColor" id="favColor" required> <br><br>

        <label for="likeness">Likeness: </label>
        <input type="range" name="likeness" id="likeness" required> <br><br>

        <button type="submit">Submit</button>

    </form>
</body>
</html>
